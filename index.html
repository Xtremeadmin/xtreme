              display:"flex",alignItems:"center",gap:16}}>
              <Avatar name={r.nome} size={60}/>
              <div style={{flex:1}}>
                <div style={{fontSize:20,fontWeight:900,color:C.text}}>{r.nome}</div>
                <div style={{fontSize:13,color:C.muted,marginTop:2}}>{r.empresa}</div>
                {op&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>Cadastrado por @{op.user}</div>}
                <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
                  {r.pago?<Chip label="✓ Pago" variant="green"/>:<Chip label="◷ Pendente" variant="amber"/>}
                  {r.epi?<Chip label="✓ EPI" variant="green"/>:<Chip label="⚠ Sem EPI" variant="red"/>}
                  <span style={{background:`${t.color}22`,border:`1px solid ${t.color}44`,color:t.color,
                    borderRadius:6,padding:"2px 9px",fontSize:11,fontWeight:700,letterSpacing:0.5,textTransform:"uppercase"}}>
                    {t.icon} {t.label}
                  </span>
                </div>
              </div>
            </div>

            {/* Info grid */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
              {[
                {label:"CPF",        value:r.cpf||"—"},
                {label:"Telefone",   value:r.tel||"—"},
                {label:"Chave PIX",  value:r.pix||"—"},
                {label:"Turno",      value:`${t.icon} ${t.label} (${t.hora})`},
              ].map((item,i)=>(
                <div key={i} style={{background:C.card,border:`1px solid ${C.border}`,
                  borderRadius:10,padding:"11px 14px"}}>
                  <div style={{fontSize:10,color:C.muted,fontWeight:700,letterSpacing:0.8,
                    textTransform:"uppercase",marginBottom:5}}>{item.label}</div>
                  <div style={{fontSize:13,fontWeight:600,color:C.text}}>{item.value}</div>
                </div>
              ))}
            </div>

            {/* Financial breakdown */}
            <div style={{background:C.card,border:`1px solid ${C.border}`,
              borderRadius:12,overflow:"hidden",marginBottom:20}}>
              <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`,
                fontSize:11,fontWeight:700,color:C.muted,letterSpacing:0.8,textTransform:"uppercase"}}>
                Resumo Financeiro — este registro
              </div>
              <div style={{padding:"14px 16px",display:"flex",flexDirection:"column",gap:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:13,color:C.muted}}>Valor da diária</span>
                  <span style={{fontSize:15,fontWeight:700,color:C.text,fontFamily:"'DM Mono',monospace"}}>{fmtBRL(r.valorDiaria)}</span>
                </div>
                {r.transporte&&(
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:13,color:C.amber}}>🚌 Desconto transporte</span>
                    </div>
                    <span style={{fontSize:14,fontWeight:700,color:C.amber,fontFamily:"'DM Mono',monospace"}}>− {fmtBRL(r.vt)}</span>
                  </div>
                )}
                {!r.transporte&&(
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:13,color:C.muted}}>🚌 Transporte</span>
                    <Chip label="Próprio / Não descontado" variant="faint"/>
                  </div>
                )}
                {r.refeicao&&r.vr>0?(
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:13,color:C.red}}>🍽 Desconto refeição</span>
                    <span style={{fontSize:14,fontWeight:700,color:C.red,fontFamily:"'DM Mono',monospace"}}>− {fmtBRL(r.vr)}</span>
                  </div>
                ):(
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:13,color:C.muted}}>🍽 Refeição</span>
                    <Chip label="Não descontada" variant="faint"/>
                  </div>
                )}
                <div style={{height:1,background:C.border}}/>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:14,fontWeight:800,color:C.text}}>Total líquido</span>
                  <span style={{fontSize:22,fontWeight:900,color:C.green,fontFamily:"'DM Mono',monospace"}}>{fmtBRL(r.total)}</span>
                </div>
              </div>
            </div>

            {/* All records for this employee */}
            {todosRegs.length>1&&(
              <div style={{marginBottom:20}}>
                <div style={{fontSize:11,fontWeight:700,color:C.muted,letterSpacing:0.8,
                  textTransform:"uppercase",marginBottom:10}}>
                  Todos os registros de {r.nome.split(" ")[0]} ({diasTrab} dias · {pagoCount} pagos)
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:240,overflowY:"auto",paddingRight:2}}>
                  {todosRegs.map((x,xi)=>{
                    const xt=getTurno(x.turno);
                    const isThis=x.id===r.id;
                    return(
                      <div key={xi} style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                        background:isThis?`${C.green}11`:C.card,
                        border:`1px solid ${isThis?C.greenBrd:C.border}`,
                        borderRadius:9,padding:"9px 14px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:10}}>
                          <span style={{fontSize:13,fontFamily:"'DM Mono',monospace",
                            fontWeight:700,color:isThis?C.green:C.text}}>{fmtDate(x.data)}</span>
                          <span style={{fontSize:11,color:C.muted}}>
                            {["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"][new Date(x.data+"T12:00:00").getDay()]}
                          </span>
                          <span style={{background:`${xt.color}22`,border:`1px solid ${xt.color}44`,
                            color:xt.color,borderRadius:5,padding:"1px 7px",fontSize:10,fontWeight:700}}>
                            {xt.icon} {xt.label}
                          </span>
                          {isThis&&<span style={{fontSize:10,color:C.green,fontWeight:700}}>(este)</span>}
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          {x.transporte&&<span style={{fontSize:11,color:C.amber}}>🚌−{fmtBRL(x.vt)}</span>}
                          {x.refeicao&&x.vr>0&&<span style={{fontSize:11,color:C.red}}>🍽−{fmtBRL(x.vr)}</span>}
                          <span style={{fontSize:13,fontWeight:800,color:C.green,fontFamily:"'DM Mono',monospace"}}>{fmtBRL(x.total)}</span>
                          {x.pago?<Chip label="✓" variant="green"/>:<Chip label="◷" variant="amber"/>}
                        </div>
                      </div>
                    );
                  })}
                </div>
                {/* acumulado */}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
                  marginTop:10,background:`${C.green}11`,border:`1px solid ${C.greenBrd}`,
                  borderRadius:9,padding:"10px 14px"}}>
                  <span style={{fontSize:12,fontWeight:700,color:C.muted}}>Total acumulado ({diasTrab} dias)</span>
                  <span style={{fontSize:18,fontWeight:900,color:C.green,fontFamily:"'DM Mono',monospace"}}>{fmtBRL(totalAcum)}</span>
                </div>
              </div>
            )}

            {/* Obs */}
            {r.obs&&(
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,
                padding:"12px 14px",marginBottom:16}}>
                <div style={{fontSize:10,color:C.muted,fontWeight:700,letterSpacing:0.8,
                  textTransform:"uppercase",marginBottom:6}}>📝 Observações</div>
                <div style={{fontSize:13,color:C.text}}>{r.obs}</div>
              </div>
            )}

            <div style={{display:"flex",gap:10}}>
              <button onClick={()=>{setModalFunc(null);openEdit(r);}} style={{flex:1,
                background:C.card,border:`1px solid ${C.border}`,color:C.muted,
                padding:"11px",borderRadius:11,cursor:"pointer",fontFamily:"inherit",
                fontSize:13,fontWeight:700}}>✏ Editar</button>
              <button onClick={()=>setModalFunc(null)} style={{flex:2,
                background:"linear-gradient(135deg,#F97316,#EA580C)",border:"none",
                color:"#0A0A0A",padding:"11px",borderRadius:11,cursor:"pointer",
                fontFamily:"inherit",fontSize:14,fontWeight:800}}>Fechar</button>
            </div>
          </Modal>
        );
      })()}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   ROOT  — hooks must all be declared before any early return
══════════════════════════════════════════════════════════════ */
/* ══════════════════════════════════════════════════════════════
   FIREBASE CONFIG
══════════════════════════════════════════════════════════════ */
const FB_URL = "https://xtreme-af7c2-default-rtdb.firebaseio.com";

async function fbGet(path){
  const r = await fetch(`${FB_URL}/${path}.json`);
  return r.ok ? r.json() : null;
}
async function fbSet(path, data){
  await fetch(`${FB_URL}/${path}.json`, {
    method:"PUT", headers:{"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });
}
async function fbPatch(path, data){
  await fetch(`${FB_URL}/${path}.json`, {
    method:"PATCH", headers:{"Content-Type":"application/json"},
    body: JSON.stringify(data)
  });
}
async function fbDelete(path){
  await fetch(`${FB_URL}/${path}.json`, { method:"DELETE" });
}
function fbListen(path, cb){
  const url = `${FB_URL}/${path}.json`;
  let active = true;
  let timer = null;
  let lastJson = null;
  async function poll(){
    if(!active) return;
    try{
      const r = await fetch(url);
      const j = await r.text();
      if(j !== lastJson){ lastJson = j; cb(JSON.parse(j)); }
    }catch(e){}
    if(active) timer = setTimeout(poll, 2000);
  }
  poll();
  return ()=>{ active=false; clearTimeout(timer); };
}

function App(){
  const [user, setUser]         = useState(null);
  const [rows, setRows]         = useState([]);
  const [users, setUsers]       = useState(INIT_USERS);
  const [empresas, setEmpresas] = useState(INIT_EMPRESAS);
  const [funcs, setFuncs]       = useState(INIT_FUNCS);
  const [loaded, setLoaded]     = useState(false);
  const [syncMsg, setSyncMsg]   = useState("");
  const [online, setOnline]     = useState(true);

  // ── bootstrap: seed Firebase on first run, then listen ──
  useEffect(()=>{
    let unsubs = [];

    async function init(){
      try{
        // rows
        const dbRows = await fbGet("rows");
        if(!dbRows){
          const seedObj = {};
          SEED.forEach(r=>{ seedObj[r.id]=r; });
          await fbSet("rows", seedObj);
        }
        // users
        const dbUsers = await fbGet("users");
        if(!dbUsers){
          const uObj = {};
          INIT_USERS.forEach(u=>{ uObj[u.id]=u; });
          await fbSet("users", uObj);
        }
        // empresas
        const dbEmp = await fbGet("empresas");
        if(!dbEmp){
          await fbSet("empresas", INIT_EMPRESAS);
        }
        // funcs
        const dbFuncs = await fbGet("funcs");
        if(!dbFuncs){
          const fObj = {};
          INIT_FUNCS.forEach(f=>{ fObj[f.id]=f; });
          await fbSet("funcs", fObj);
        }
        setOnline(true);
      }catch(e){ setOnline(false); }
      setLoaded(true);
    }
    init();

    // live listeners
    unsubs.push(fbListen("rows", data=>{
      if(data) setRows(Object.values(data));
      else setRows([]);
    }));
    unsubs.push(fbListen("users", data=>{
      if(data){
        const list = Object.values(data);
        setUsers(list);
        setUser(prev=>{ if(!prev)return prev; return list.find(u=>u.id===prev.id)||prev; });
      }
    }));
    unsubs.push(fbListen("empresas", data=>{
      if(data) setEmpresas(Array.isArray(data)?data:Object.values(data));
    }));
    unsubs.push(fbListen("funcs", data=>{
      if(data) setFuncs(Object.values(data));
      else setFuncs([]);
    }));

    return ()=>unsubs.forEach(fn=>fn());
  },[]);

  // ── sync helpers ──
  function flash(msg){ setSyncMsg(msg); setTimeout(()=>setSyncMsg(""),2500); }

  async function handleSetRows(fn){
    const next = typeof fn==="function" ? fn(rows) : fn;
    setRows(next);
    const obj={}; next.forEach(r=>{ obj[r.id]=r; });
    await fbSet("rows", obj);
    flash("✓ Sincronizado");
  }

  async function handleSetUsers(fn){
    const next = typeof fn==="function" ? fn(users) : fn;
    setUsers(next);
    if(user){ const u=next.find(x=>x.id===user.id); if(u)setUser(u); }
    const obj={}; next.forEach(u=>{ obj[u.id]=u; });
    await fbSet("users", obj);
    flash("✓ Sincronizado");
  }

  async function handleSetEmpresas(fn){
    const next = typeof fn==="function" ? fn(empresas) : fn;
    setEmpresas(next);
    await fbSet("empresas", next);
    flash("✓ Sincronizado");
  }

  async function handleSetFuncs(fn){
    const next = typeof fn==="function" ? fn(funcs) : fn;
    setFuncs(next);
    const obj={}; next.forEach(f=>{ obj[f.id]=f; });
    await fbSet("funcs", obj);
    flash("✓ Sincronizado");
  }

  function handleLogin(u){
    const fresh = users.find(x=>x.id===u.id)||u;
    setUser(fresh);
  }

  if(!loaded) return(
    <div style={{minHeight:"100vh",background:"#080808",display:"flex",flexDirection:"column",
      alignItems:"center",justifyContent:"center",fontFamily:"DM Sans,sans-serif",color:"#F0F0F0"}}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet"/>
      <div style={{width:60,height:60,borderRadius:16,
        background:"linear-gradient(135deg,#F97316,#EA580C)",
        display:"flex",alignItems:"center",justifyContent:"center",marginBottom:24,
        boxShadow:"0 8px 32px #F9731650"}}>
        <span style={{fontSize:30,fontWeight:900,color:"#fff",fontFamily:"Arial Black",letterSpacing:-3}}>✕</span>
      </div>
      <div style={{fontSize:22,fontWeight:900,letterSpacing:2,
        background:"linear-gradient(90deg,#F97316,#FB923C)",
        WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>XTREME</div>
      <div style={{marginTop:20,fontSize:13,color:"#707070"}}>
        {online?"Conectando ao banco de dados...":"Sem conexão com a internet"}
      </div>
      <div style={{marginTop:16,width:48,height:48,border:"4px solid #F97316",
        borderTopColor:"transparent",borderRadius:"50%",
        animation:"spin 0.8s linear infinite"}}/>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  return(
    <>
      {/* Sync badge */}
      {syncMsg&&(
        <div style={{position:"fixed",bottom:20,right:20,zIndex:9999,
          background:"#F97316",color:"#fff",padding:"10px 18px",borderRadius:12,
          fontFamily:"DM Sans,sans-serif",fontWeight:700,fontSize:13,
          boxShadow:"0 4px 20px #F9731660",animation:"fadeIn 0.2s ease"}}>
          ⚡ {syncMsg}
        </div>
      )}
      {!online&&(
        <div style={{position:"fixed",top:0,left:0,right:0,zIndex:9999,
          background:"#EF4444",color:"#fff",textAlign:"center",
          padding:"8px",fontFamily:"DM Sans,sans-serif",fontSize:13,fontWeight:700}}>
          ⚠ Sem conexão — alterações podem não ser salvas
        </div>
      )}
      <style>{`@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}`}</style>

      {!user
        ? <LoginScreen onLogin={handleLogin} users={users}/>
        : user.role==="operator"
          ? <OperatorView currentUser={user} rows={rows} setRows={handleSetRows}
              onLogout={()=>setUser(null)} users={users}
              empresas={empresas} setEmpresas={handleSetEmpresas}/>
          : <AdminView currentUser={user} rows={rows} setRows={handleSetRows}
              onLogout={()=>setUser(null)} users={users} setUsers={handleSetUsers}
              empresas={empresas} setEmpresas={handleSetEmpresas}
              funcs={funcs} setFuncs={handleSetFuncs}/>
      }
    </>
  );
}


const _root = ReactDOM.createRoot(document.getElementById('root'));
_root.render(React.createElement(App));

// Esconde splash
setTimeout(function(){
  var s = document.getElementById('splash');
  if(s){ s.classList.add('hide'); setTimeout(function(){ if(s.parentNode) s.parentNode.removeChild(s); },600); }
},1500);
  </script>

</body>
