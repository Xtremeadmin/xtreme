<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#F97316"/>
  <title>XTREME — Logística e Terceirização</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow-x:hidden}
    body{background:#080808;font-family:'DM Sans',sans-serif;color:#F0F0F0;
      -webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
    #root{min-height:100vh}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:#111}
    ::-webkit-scrollbar-thumb{background:#F97316;border-radius:3px}
    input,select,button,textarea{font-family:'DM Sans',sans-serif;-webkit-appearance:none}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    #splash{position:fixed;inset:0;background:#080808;display:flex;flex-direction:column;
      align-items:center;justify-content:center;z-index:99999;transition:opacity .5s}
    #splash.hide{opacity:0;pointer-events:none}
  </style>
</head>
<body>

  <div id="splash">
    <div style="width:80px;height:80px;border-radius:20px;
      background:linear-gradient(135deg,#F97316,#EA580C);
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 8px 32px rgba(249,115,22,0.5);margin-bottom:20px">
      <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
        <line x1="8" y1="8" x2="36" y2="36" stroke="white" stroke-width="6" stroke-linecap="round"/>
        <line x1="36" y1="8" x2="8" y2="36" stroke="white" stroke-width="6" stroke-linecap="round"/>
      </svg>
    </div>
    <div style="font-size:28px;font-weight:900;letter-spacing:4px;
      background:linear-gradient(90deg,#F97316,#FB923C);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px">XTREME</div>
    <div style="font-size:11px;color:#606060;letter-spacing:2px;text-transform:uppercase;margin-bottom:36px">
      Logística e Terceirização</div>
    <div style="width:36px;height:36px;border:3px solid #F97316;border-top-color:transparent;
      border-radius:50%;animation:spin .8s linear infinite"></div>
    <div style="margin-top:16px;font-size:12px;color:#505050">Carregando...</div>
  </div>

  <div id="root"></div>

  <!-- React 18 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel standalone para transformar JSX -->
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

  <script type="text/babel">
const { useState, useMemo, useEffect } = React;

  { id:"manha",  label:"Manhã",  icon:"🌅", hora:"06h–12h", color:C.amber  },
  { id:"tarde",  label:"Tarde",  icon:"☀️",  hora:"12h–18h", color:C.green  },

const ACOLOR = ["#22D3A4","#F59E0B","#38BDF8","#A78BFA","#F43F5E",
  "#34D399","#FB923C","#F472B6","#60A5FA","#818CF8"];
function avatarColor(n){ let h=0; for(let c of n) h=n.charCodeAt(0)+((h<<5)-h); return ACOLOR[Math.abs(h)%ACOLOR.length]; }
function initials(n){ return n.split(" ").slice(0,2).map(x=>x[0]).join("").toUpperCase(); }
function fmtBRL(v){ return new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(v); }
function fmtDate(s){ if(!s)return"—"; const[y,m,d]=s.split("-"); return`${d}/${m}/${y}`; }
function calcTotal(diaria,transp,vt,ref,vr){ return Math.max(0, Number(diaria||0)-(transp?Number(vt||0):0)-(ref?Number(vr||0):0)); }
function getTurno(id){ return TURNOS.find(t=>t.id===id)||TURNOS[3]; }

  {id:mkId(),nome:"Carlos Mendes", cpf:"456.123.789-00",pix:"carlos.mendes",      tel:"(11)96666-4444",empresa:"Escritório Central", turno:"tarde", data:"2026-03-06",valorDiaria:190,transporte:false,vt:0, epi:true, pago:false,obs:"",         criadoPor:"o2"},

  {id:mkId(),nome:"Roberto Alves", cpf:"654.321.987-00",pix:"roberto.alves",      tel:"(11)94444-6666",empresa:"Casa Feliz LTDA",    turno:"diaria",data:"2026-03-09",valorDiaria:210,transporte:false,vt:0, epi:true, pago:false,obs:"",         criadoPor:"o2"},

/* ══════════════════════════════════════════════════════════════
   PRIMITIVES
══════════════════════════════════════════════════════════════ */
function Avatar({name,size=36,color}){
  const bg=color||avatarColor(name);
  return(
    <div style={{width:size,height:size,borderRadius:size*0.28,flexShrink:0,
      background:`${bg}20`,border:`1.5px solid ${bg}55`,
      display:"flex",alignItems:"center",justifyContent:"center",
      fontSize:size*0.34,fontWeight:800,color:bg,letterSpacing:-0.5}}>
      {initials(name)}
    </div>
  );
}

function Chip({label,variant="green"}){
  const M={
    green:{bg:C.greenDim,brd:C.greenBrd,txt:C.green},
    amber:{bg:C.amberDim,brd:C.amberBrd,txt:C.amber},
    red:  {bg:C.redDim,  brd:C.redBrd,  txt:C.red  },
    blue: {bg:C.blueDim, brd:C.blueBrd, txt:C.blue },
    purple:{bg:C.purpleDim,brd:C.purpleBrd,txt:C.purple},
    faint:{bg:"#1a2a3a",brd:C.faint,txt:C.muted},
  };
  const v=M[variant]||M.faint;
  return(
    <span style={{background:v.bg,border:`1px solid ${v.brd}`,color:v.txt,
      borderRadius:6,padding:"2px 9px",fontSize:11,fontWeight:700,
      letterSpacing:0.6,textTransform:"uppercase",whiteSpace:"nowrap"}}>{label}</span>
  );
}

function Toggle({checked,onChange,color=C.green,disabled=false}){
  return(
    <div onClick={()=>!disabled&&onChange(!checked)} style={{
      width:44,height:24,borderRadius:12,cursor:disabled?"not-allowed":"pointer",flexShrink:0,
      background:checked?color:C.faint,position:"relative",transition:"background 0.2s",
      opacity:disabled?0.5:1,boxShadow:checked?`0 0 8px ${color}55`:"none"}}>
      <div style={{position:"absolute",top:3,left:checked?23:3,width:18,height:18,
        borderRadius:"50%",background:"#fff",transition:"left 0.2s"}}/>
    </div>
  );
}

function Inp({label,value,onChange,type="text",placeholder,note,disabled=false}){
  const[f,setF]=useState(false);
  return(
    <div style={{marginBottom:14}}>
      {label&&<label style={{display:"block",color:C.muted,fontSize:11,fontWeight:700,
        letterSpacing:0.8,textTransform:"uppercase",marginBottom:5}}>{label}</label>}
      <input type={type} value={value} onChange={e=>onChange(e.target.value)}
        placeholder={placeholder} disabled={disabled}
        onFocus={()=>setF(true)} onBlur={()=>setF(false)}
        style={{width:"100%",background:disabled?"#0a1020":f?C.cardHov:C.card,
          border:`1.5px solid ${f?C.green:C.border}`,borderRadius:10,
          padding:"10px 14px",color:disabled?C.muted:C.text,fontSize:14,
          outline:"none",boxSizing:"border-box",fontFamily:"inherit",
          cursor:disabled?"not-allowed":"text"}}/>
      {note&&<div style={{fontSize:11,color:C.muted,marginTop:3}}>{note}</div>}
    </div>
  );
}

function SelF({label,value,onChange,options,disabled=false}){
  return(
    <div style={{marginBottom:14}}>
      {label&&<label style={{display:"block",color:C.muted,fontSize:11,fontWeight:700,
        letterSpacing:0.8,textTransform:"uppercase",marginBottom:5}}>{label}</label>}
      <select value={value} onChange={e=>onChange(e.target.value)} disabled={disabled}
        style={{width:"100%",background:C.card,border:`1.5px solid ${C.border}`,
          borderRadius:10,padding:"10px 14px",color:C.text,fontSize:14,
          outline:"none",boxSizing:"border-box",fontFamily:"inherit",cursor:"pointer"}}>
        {options.map(o=><option key={o.v||o} value={o.v||o}>{o.l||o}</option>)}
      </select>
    </div>
  );
}

function TogRow({label,hint,checked,onChange,color=C.green,disabled=false}){
  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",
      background:C.card,border:`1px solid ${C.border}`,borderRadius:10,
      padding:"11px 15px",marginBottom:9}}>
      <div>
        <div style={{fontSize:14,fontWeight:600,color:disabled?C.muted:C.text}}>{label}</div>
        {hint&&<div style={{fontSize:11,color:C.muted,marginTop:1}}>{hint}</div>}
      </div>
      <Toggle checked={checked} onChange={onChange} color={color} disabled={disabled}/>
    </div>
  );
}

function Modal({title,onClose,children}){
  return(
    <div style={{position:"fixed",inset:0,background:"#00000099",zIndex:200,
      display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{
        background:C.panel,border:`1px solid ${C.border}`,borderRadius:20,
        padding:"28px 30px",width:"100%",maxWidth:540,maxHeight:"92vh",
        overflowY:"auto",boxShadow:"0 40px 100px #00000099"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:22}}>
          <h2 style={{margin:0,fontSize:19,fontWeight:800,color:C.text}}>{title}</h2>
          <button onClick={onClose} style={{background:C.card,border:`1px solid ${C.border}`,
            color:C.muted,width:32,height:32,borderRadius:9,cursor:"pointer",fontSize:18}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   LOGIN SCREEN
══════════════════════════════════════════════════════════════ */
function LoginScreen({onLogin,users}){
  const[user,setUser]=useState("");
  const[senha,setSenha]=useState("");
  const[err,setErr]=useState("");
  const[show,setShow]=useState(false);

  function tentar(){
    const u=users.find(u=>u.user===user.trim()&&u.senha===senha);
    if(u){ onLogin(u); }
    else{ setErr("Usuário ou senha inválidos"); setTimeout(()=>setErr(""),2500); }
  }

  return(
    <div style={{minHeight:"100vh",background:C.bg,display:"flex",
      alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans','Sora',sans-serif"}}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

      {/* Background glow */}
      <div style={{position:"fixed",top:"20%",left:"50%",transform:"translateX(-50%)",
        width:500,height:300,borderRadius:"50%",background:C.greenDim,filter:"blur(80px)",pointerEvents:"none"}}/>

      <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:24,
        padding:"40px 44px",width:"100%",maxWidth:400,
        boxShadow:"0 40px 100px #00000088",position:"relative"}}>

        {/* Logo */}
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{width:56,height:56,borderRadius:16,
            background:"linear-gradient(135deg,#F97316,#EA580C)",
            display:"flex",alignItems:"center",justifyContent:"center",
            fontSize:28,margin:"0 auto 14px",boxShadow:"0 8px 28px #F9731650"}}>
            <span style={{fontSize:28,fontWeight:900,color:"#fff",fontFamily:"Arial Black,sans-serif",letterSpacing:-3}}>✕</span></div>
          <div style={{fontSize:26,fontWeight:900,letterSpacing:-0.5,
            background:"linear-gradient(90deg,#F97316,#EA580C)",
            WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>XTREME</div>
          <div style={{fontSize:12,color:C.muted,marginTop:4,letterSpacing:1,textTransform:"uppercase"}}>Logística e Terceirização</div>
        </div>

        {/* Form */}
        <div style={{marginBottom:14}}>
          <label style={{display:"block",color:C.muted,fontSize:11,fontWeight:700,
            letterSpacing:0.8,textTransform:"uppercase",marginBottom:6}}>Usuário</label>
          <input value={user} onChange={e=>setUser(e.target.value)}
            placeholder="seu.usuario" onKeyDown={e=>e.key==="Enter"&&tentar()}
            style={{width:"100%",background:C.card,border:`1.5px solid ${C.border}`,
              borderRadius:10,padding:"11px 14px",color:C.text,fontSize:14,
              outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}
            onFocus={e=>e.target.style.borderColor=C.green}
            onBlur={e=>e.target.style.borderColor=C.border}/>
        </div>

        <div style={{marginBottom:20}}>
          <label style={{display:"block",color:C.muted,fontSize:11,fontWeight:700,
            letterSpacing:0.8,textTransform:"uppercase",marginBottom:6}}>Senha</label>
          <div style={{position:"relative"}}>
            <input type={show?"text":"password"} value={senha} onChange={e=>setSenha(e.target.value)}
              placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&tentar()}
              style={{width:"100%",background:C.card,border:`1.5px solid ${C.border}`,
                borderRadius:10,padding:"11px 44px 11px 14px",color:C.text,fontSize:14,
                outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}
              onFocus={e=>e.target.style.borderColor=C.green}
              onBlur={e=>e.target.style.borderColor=C.border}/>
            <button onClick={()=>setShow(s=>!s)} style={{position:"absolute",right:12,top:"50%",
              transform:"translateY(-50%)",background:"none",border:"none",color:C.muted,
              cursor:"pointer",fontSize:15,padding:0}}>{show?"🙈":"👁"}</button>
          </div>
        </div>

        {err&&(
          <div style={{background:C.redDim,border:`1px solid ${C.redBrd}`,borderRadius:10,
            padding:"10px 14px",color:C.red,fontSize:13,fontWeight:600,
            marginBottom:16,textAlign:"center"}}>⚠ {err}</div>
        )}

        <button onClick={tentar} style={{width:"100%",
          background:`linear-gradient(135deg,#F97316,#EA580C)`,border:"none",
          color:C.bg,padding:"13px",borderRadius:12,cursor:"pointer",
          fontFamily:"inherit",fontSize:15,fontWeight:800,
          boxShadow:`0 4px 20px ${C.greenSoft}`}}>
          Entrar
        </button>

        {/* Hint card */}
        <div style={{marginTop:28,background:C.card,border:`1px solid ${C.border}`,
          borderRadius:12,padding:"14px 16px"}}>
          <div style={{fontSize:11,color:C.muted,fontWeight:700,letterSpacing:0.8,
            textTransform:"uppercase",marginBottom:10}}>Contas de acesso</div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {users.map(u=>(
              <div key={u.id} style={{display:"flex",alignItems:"center",
                justifyContent:"space-between",gap:8}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <Avatar name={u.nome} size={28} color={u.role==="admin"?C.purple:C.blue}/>
                  <div>
                    <div style={{fontSize:12,fontWeight:700}}>{u.nome}</div>
                    <div style={{fontSize:11,color:C.muted,fontFamily:"'DM Mono',monospace"}}>
                      {u.user} / {u.senha}
                    </div>
                  </div>
                </div>
                <Chip label={u.role==="admin"?"Admin":"Operador"}
                  variant={u.role==="admin"?"purple":"blue"}/>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   OPERATOR VIEW — só inserção de registros
══════════════════════════════════════════════════════════════ */
const emptyReg={
  nome:"",cpf:"",pix:"",tel:"",empresa:"",turno:"diaria",
  data:"",valorDiaria:"",transporte:false,vt:"",refeicao:false,vr:"",epi:true,obs:""
};

function OperatorView({currentUser,rows,setRows,onLogout,users,empresas,setEmpresas}){
  const[form,setForm]=useState(emptyReg);
  const[saved,setSaved]=useState(false);

  const total=calcTotal(form.valorDiaria,form.transporte,form.vt,form.refeicao,form.vr);
  const turno=getTurno(form.turno);

  function salvar(){
    if(!form.nome.trim()||!form.empresa||!form.data) return;
    const novo={
      id:mkId(),nome:form.nome,cpf:form.cpf,pix:form.pix,tel:form.tel,
      empresa:form.empresa,turno:form.turno,data:form.data,
      valorDiaria:Number(form.valorDiaria)||0,
      transporte:form.transporte,vt:Number(form.vt)||0,
      refeicao:form.refeicao,vr:Number(form.vr)||0,
      epi:form.epi,pago:false,obs:form.obs,
      criadoPor:currentUser.id,
      total:calcTotal(form.valorDiaria,form.transporte,form.vt,form.refeicao,form.vr)
    };
    setRows(prev=>[...prev,novo]);
    setForm(emptyReg);
    setSaved(true);
    setTimeout(()=>setSaved(false),3000);
  }

  // meus registros (só os criados por este operador)
  const meus=rows.filter(r=>r.criadoPor===currentUser.id)

/* ══════════════════════════════════════════════════════════════
   EXPORT — gera .xls via HTML table trick (sem dependência externa)
══════════════════════════════════════════════════════════════ */
function exportToExcel(rows, filtrado) {
  const lista = filtrado && filtrado.length > 0 ? filtrado : rows;
  const date = new Date().toLocaleDateString("pt-BR");

  function esc(v) {
    if (v === null || v === undefined) return "";
    return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function makeTable(headers, data) {
    const hRow = headers.map(h => `<th style="background:#EA580C;color:#fff;padding:6px 10px;border:1px solid #999;white-space:nowrap">${esc(h)}</th>`).join("");
    const rows = data.map((row, i) => {
      const bg = i % 2 === 0 ? "#fff" : "#FFF8E1";
      const cells = headers.map(h => `<td style="padding:5px 10px;border:1px solid #ccc;background:${bg}">${esc(row[h])}</td>`).join("");
      return `<tr>${cells}</tr>`;
    }).join("");
    return `<table border="1" style="border-collapse:collapse;font-family:Arial;font-size:12px"><thead><tr>${hRow}</tr></thead><tbody>${rows}</tbody></table>`;
  }

  // Sheet 1 — Registros
  const reg = lista.map(r => {
    const t = getTurno(r.turno);
    const op = users.find(u => u.id === r.criadoPor);
    return {
      "Nome": r.nome,
      "CPF": r.cpf || "—",
      "Telefone": r.tel || "—",
      "Chave PIX": r.pix || "—",
      "Empresa": r.empresa,
      "Data": fmtDate(r.data),
      "Turno": t.label + " (" + t.hora + ")",
      "Valor Diária R$": r.valorDiaria,
      "Transporte": r.transporte ? "Sim" : "Não",
      "Valor Transp. R$": r.transporte ? r.vt : 0,
      "Refeição": r.refeicao ? "Sim" : "Não",
      "Valor Refeição R$": r.refeicao ? (r.vr || 0) : 0,
      "Total Líquido R$": r.total,
      "EPI": r.epi ? "Sim" : "Não",
      "Pagamento": r.pago ? "Pago" : "Pendente",
      "Observações": r.obs || "",
      "Cadastrado por": op ? op.nome : "—",
    };
  });

  // Sheet 2 — Por Empresa
  const empMap = {};
  lista.forEach(r => {
    if (!empMap[r.empresa]) empMap[r.empresa] = {total:0,pago:0,pendente:0,count:0,semEpi:0};
    empMap[r.empresa].total += r.total;
    if (r.pago) empMap[r.empresa].pago += r.total; else empMap[r.empresa].pendente += r.total;
    empMap[r.empresa].count++;
    if (!r.epi) empMap[r.empresa].semEpi++;
  });
  const emp = Object.entries(empMap).map(([e,s]) => ({
    "Empresa": e, "Registros": s.count,
    "Total R$": s.total.toFixed(2),
    "Pago R$": s.pago.toFixed(2),
    "Pendente R$": s.pendente.toFixed(2),
    "Sem EPI": s.semEpi,
  }));

  // Sheet 3 — Por Turno
  const tMap = {};
  lista.forEach(r => {
    const lb = getTurno(r.turno).label;
    if (!tMap[lb]) tMap[lb] = {total:0,pago:0,count:0};
    tMap[lb].total += r.total;
    if (r.pago) tMap[lb].pago += r.total;
    tMap[lb].count++;
  });
  const turnos = Object.entries(tMap).map(([t,s]) => ({
    "Turno": t, "Registros": s.count,
    "Total R$": s.total.toFixed(2),
    "Pago R$": s.pago.toFixed(2),
    "Pendente R$": (s.total-s.pago).toFixed(2),
  }));

  // Sheet 4 — Resumo
  const tGeral = lista.reduce((a,r)=>a+r.total,0);
  const tPago  = lista.filter(r=>r.pago).reduce((a,r)=>a+r.total,0);
  const resumo = [
    {"Indicador":"Total de Registros",   "Valor": lista.length},
    {"Indicador":"Total Geral R$",        "Valor": tGeral.toFixed(2)},
    {"Indicador":"Total Pago R$",         "Valor": tPago.toFixed(2)},
    {"Indicador":"Total Pendente R$",     "Valor": (tGeral-tPago).toFixed(2)},
    {"Indicador":"Funcionários Sem EPI",  "Valor": lista.filter(r=>!r.epi).length},
    {"Indicador":"Data de Exportação",    "Valor": date},
  ];

  const logo = `<div style="background:linear-gradient(90deg,#F97316,#EA580C);padding:14px 20px;margin-bottom:20px;border-radius:4px">
    <span style="color:#fff;font-size:22px;font-weight:900;font-family:Arial Black">✕ XTREME</span>
    <span style="color:#ffffffaa;font-size:13px;margin-left:12px">Logística e Terceirização</span>
    <span style="float:right;color:#ffffffaa;font-size:12px;padding-top:4px">Exportado em ${date}</span>
  </div>`;

  const section = (title, table) =>
    `<h3 style="font-family:Arial;color:#EA580C;margin:24px 0 8px;border-bottom:2px solid #F97316;padding-bottom:4px">${title}</h3>${table}`;

  const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="UTF-8"><!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets>
<x:ExcelWorksheet><x:Name>Registros Xtreme</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions></x:ExcelWorksheet>
</x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head>
<body>
${logo}
${section("📋 Registros Completos (" + lista.length + " itens)", makeTable(Object.keys(reg[0]||{"Nome":""}), reg))}
${section("🏢 Resumo por Empresa", makeTable(Object.keys(emp[0]||{"Empresa":""}), emp))}
${section("⏰ Resumo por Turno", makeTable(Object.keys(turnos[0]||{"Turno":""}), turnos))}
${section("📊 Resumo Geral", makeTable(["Indicador","Valor"], resumo))}
</body></html>`;

  const blob = new Blob([html], { type: "application/vnd.ms-excel;charset=utf-8" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = "Xtreme_" + new Date().toISOString().split("T")[0] + ".xls";
  a.click();
  URL.revokeObjectURL(url);
}

/* ══════════════════════════════════════════════════════════════
   FUNCIONÁRIOS TAB — cadastro e exclusão de funcionários
══════════════════════════════════════════════════════════════ */
function FuncionariosTab({funcs,setFuncs,rows,empresas,openAdd,setForm,setEditRow,setModalReg}){
  const[search,setSearch]=useState("");
  const[filtEmp,setFiltEmp]=useState("todas");
  const[form,setFForm]=useState({nome:"",cpf:"",tel:"",pix:"",empresa:""});
  const[err,setErr]=useState("");
  const[msg,setMsg]=useState("");
  const[confirmDel,setConfirmDel]=useState(null);
  const[addOpen,setAddOpen]=useState(false);

  const filtered=funcs.filter(f=>{
    if(filtEmp!=="todas"&&f.empresa!==filtEmp)return false;
    if(search&&!f.nome.toLowerCase().includes(search.toLowerCase())&&
       !(f.cpf||"").includes(search))return false;
    return true;
  });

  function adicionar(){
    if(!form.nome.trim()){setErr("Nome é obrigatório.");return;}
    if(funcs.find(f=>f.nome.toLowerCase()===form.nome.trim().toLowerCase())){
      setErr("Funcionário já cadastrado.");return;
    }
    setFuncs(prev=>[...prev,{
      id:"f"+Date.now(),nome:form.nome.trim(),cpf:form.cpf.trim(),
      tel:form.tel.trim(),pix:form.pix.trim(),empresa:form.empresa||empresas[0]||""
    }]);
    setFForm({nome:"",cpf:"",tel:"",pix:"",empresa:""});
    setMsg("✓ Funcionário adicionado!"); setErr("");
    setTimeout(()=>setMsg(""),2000);
    setAddOpen(false);
  }

  function excluir(id){
    setFuncs(prev=>prev.filter(f=>f.id!==id));
    setConfirmDel(null);
  }

  function novoRegistro(f){
    setForm(prev=>({...prev,nome:f.nome,cpf:f.cpf||"",tel:f.tel||"",pix:f.pix||"",empresa:f.empresa||""}));
    setEditRow(null);
    setModalReg(true);

    <button onClick={onClick} style={{background:active?(color||C.green):C.card,
      color:active?(color?C.text:C.bg):C.muted,

      {label}

    <div>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:12}}>
        <div>
          <h1 style={{fontSize:24,fontWeight:800,margin:0}}>Funcionários</h1>
          <p style={{color:C.muted,marginTop:4,fontSize:13,margin:0}}>{funcs.length} cadastrados · {filtered.length} exibidos</p>
        </div>
        <button onClick={()=>{setAddOpen(o=>!o);setErr("");setMsg("");}}
          style={{background:"linear-gradient(135deg,#F97316,#EA580C)",border:"none",
            color:"#0A0A0A",padding:"9px 18px",borderRadius:10,cursor:"pointer",
            fontFamily:"inherit",fontSize:14,fontWeight:800}}>
          {addOpen?"✕ Cancelar":"＋ Novo Funcionário"}
        </button>
      </div>

      {/* Formulário de adição */}
      {addOpen&&(
        <div style={{background:C.card,border:`1.5px solid ${C.green}`,borderRadius:14,
          padding:"20px",marginBottom:20}}>
          <div style={{fontSize:14,fontWeight:800,color:C.green,marginBottom:16}}>＋ Novo Funcionário</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 16px"}}>
            <div style={{marginBottom:12}}>
              <label style={{display:"block",fontSize:10,color:C.muted,fontWeight:700,
                letterSpacing:0.8,textTransform:"uppercase",marginBottom:5}}>Nome completo *</label>
              <input value={form.nome} onChange={e=>setFForm(f=>({...f,nome:e.target.value}))}
                placeholder="Nome do funcionário"
                style={{width:"100%",background:C.panel,border:`1.5px solid ${C.border}`,borderRadius:9,
                  padding:"10px 12px",color:C.text,fontSize:14,outline:"none",

                onBlur={e=>e.target.style.borderColor=C.border}/>

            <label style={{display:"block",fontSize:10,color:C.muted,fontWeight:700,

            <select value={form.empresa||empresas[0]||""} onChange={e=>setFForm(f=>({...f,empresa:e.target.value}))}
              style={{width:"100%",background:C.panel,border:`1.5px solid ${C.border}`,borderRadius:9,
                padding:"10px 12px",color:C.text,fontSize:14,outline:"none",fontFamily:"inherit"}}>
              {empresas.map(e=><option key={e} value={e}>{e}</option>)}
            </select>
          </div>
          {err&&<div style={{background:C.redDim,border:`1px solid ${C.redBrd}`,
            borderRadius:8,padding:"8px 12px",color:C.red,fontSize:12,fontWeight:600,marginBottom:10}}>⚠ {err}</div>}
          {msg&&<div style={{background:C.greenDim,border:`1px solid ${C.greenBrd}`,
            borderRadius:8,padding:"8px 12px",color:C.green,fontSize:12,fontWeight:700,marginBottom:10}}>{msg}</div>}
          <button onClick={adicionar} style={{width:"100%",
            background:"linear-gradient(135deg,#F97316,#EA580C)",border:"none",color:"#0A0A0A",
            padding:"11px",borderRadius:10,cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:800}}>
            ✓ Salvar Funcionário
          </button>
        </div>
      )}

      {/* Filtros */}
      <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:12,
        padding:"12px 16px",marginBottom:16,display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{position:"relative",flex:"0 0 200px"}}>
          <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",
            color:C.muted,fontSize:14}}>⌕</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar nome ou CPF..."
            style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:9,
              padding:"8px 10px 8px 30px",color:C.text,fontSize:13,outline:"none",
              boxSizing:"border-box",fontFamily:"inherit"}}
            onFocus={e=>e.target.style.borderColor=C.green}
            onBlur={e=>e.target.style.borderColor=C.border}/>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <Pill2 label="Todas empresas" active={filtEmp==="todas"} onClick={()=>setFiltEmp("todas")}/>
          {empresas.map(e=><Pill2 key={e} label={e.split(" ")[0]} active={filtEmp===e} onClick={()=>setFiltEmp(e)}/>)}
        </div>
        <span style={{marginLeft:"auto",fontSize:12,color:C.muted}}>{filtered.length} resultado{filtered.length!==1?"s":""}</span>
      </div>

      {/* Lista de funcionários */}
      {filtered.length===0?(
        <div style={{textAlign:"center",padding:"48px 0",color:C.muted}}>
          <div style={{fontSize:40,marginBottom:12}}>👤</div>
          <div style={{fontWeight:600,fontSize:15}}>Nenhum funcionário encontrado.</div>
        </div>
      ):(
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:14}}>
          {filtered.map(f=>{
            const regs=rows.filter(r=>r.nome===f.nome);
            const totalPg=regs.filter(r=>r.pago).reduce((a,r)=>a+r.total,0);
            const totalAll=regs.reduce((a,r)=>a+r.total,0);
            const isDel=confirmDel===f.id;
            return(
              <div key={f.id} style={{background:C.card,border:`1.5px solid ${isDel?C.red:C.border}`,
                borderRadius:14,padding:"18px",transition:"border-color 0.2s"}}>
                {/* header */}
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                  <Avatar name={f.nome} size={48}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:800,fontSize:15,color:C.text,
                      overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.nome}</div>
                    <div style={{fontSize:12,color:C.muted,marginTop:2}}>{f.empresa}</div>
                    <div style={{display:"flex",gap:8,marginTop:6}}>
                      <Chip label={`${regs.length} reg.`} variant="blue"/>
                      {regs.length>0&&<Chip label={fmtBRL(totalAll)} variant="faint"/>}
                    </div>
                  </div>
                </div>
                {/* detalhes */}
                <div style={{display:"flex",flexDirection:"column",gap:5,marginBottom:14,
                  background:C.panel,borderRadius:9,padding:"10px 12px"}}>
                  {f.cpf&&<div style={{display:"flex",gap:8,fontSize:12}}>
                    <span style={{color:C.muted,minWidth:60}}>CPF</span>
                    <span style={{color:C.text,fontFamily:"'DM Mono',monospace"}}>{f.cpf}</span>
                  </div>}
                  {f.tel&&<div style={{display:"flex",gap:8,fontSize:12}}>
                    <span style={{color:C.muted,minWidth:60}}>Telefone</span>
                    <span style={{color:C.text}}>{f.tel}</span>
                  </div>}
                  {f.pix&&<div style={{display:"flex",gap:8,fontSize:12}}>
                    <span style={{color:C.muted,minWidth:60}}>PIX</span>
                    <span style={{color:C.text}}>{f.pix}</span>
                  </div>}
                  {regs.length>0&&<div style={{display:"flex",gap:8,fontSize:12}}>
                    <span style={{color:C.muted,minWidth:60}}>Pago</span>
                    <span style={{color:C.green,fontWeight:700}}>{fmtBRL(totalPg)}</span>
                  </div>}
                </div>
                {/* ações */}
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>novoRegistro(f)} style={{flex:1,
                    background:"linear-gradient(135deg,#F97316,#EA580C)",border:"none",
                    color:"#0A0A0A",padding:"8px",borderRadius:9,cursor:"pointer",
                    fontFamily:"inherit",fontSize:12,fontWeight:800}}>
                    ＋ Registro
                  </button>
                  {isDel?(
                    <div style={{display:"flex",gap:5,flex:1}}>
                      <button onClick={()=>setConfirmDel(null)} style={{flex:1,
                        background:C.panel,border:`1px solid ${C.border}`,color:C.muted,
                        padding:"8px",borderRadius:9,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700}}>
                        Não
                      </button>
                      <button onClick={()=>excluir(f.id)} style={{flex:1,
                        background:C.redDim,border:`1px solid ${C.redBrd}`,color:C.red,
                        padding:"8px",borderRadius:9,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700}}>
                        Excluir
                      </button>
                    </div>
                  ):(
                    <button onClick={()=>setConfirmDel(f.id)} style={{
                      background:C.redDim,border:`1px solid ${C.redBrd}`,color:C.red,
                      padding:"8px 14px",borderRadius:9,cursor:"pointer",
                      fontFamily:"inherit",fontSize:12,fontWeight:700}}>
                      🗑
                    </button>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   MODAL GERENCIAR EMPRESAS
══════════════════════════════════════════════════════════════ */
function ModalEmpresas({empresas,setEmpresas,rows,onClose}){
  const[nova,setNova]=useState("");
  const[err,setErr]=useState("");
  const[confirmDel,setConfirmDel]=useState(null);

  function adicionar(){
    const nome=nova.trim();
    if(!nome){ setErr("Digite o nome da empresa."); return; }
    if(empresas.find(e=>e.toLowerCase()===nome.toLowerCase())){
      setErr("Essa empresa já existe."); return;
    }
    setEmpresas(prev=>[...prev,nome]);
    setNova(""); setErr("");
  }

  function excluir(emp){
    setEmpresas(prev=>prev.filter(e=>e!==emp));
    setConfirmDel(null);
  }

  return(
    <Modal title="🏢 Gerenciar Empresas" onClose={onClose}>
      {/* Lista de empresas */}
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
        {empresas.length===0&&(
          <div style={{textAlign:"center",padding:"20px 0",color:C.muted,fontSize:13}}>
            Nenhuma empresa cadastrada.
          </div>
        )}
        {empresas.map((emp,i)=>{
          const regs=rows.filter(r=>r.empresa===emp).length;
          const pago=rows.filter(r=>r.empresa===emp&&r.pago).reduce((a,r)=>a+r.total,0);
          const total=rows.filter(r=>r.empresa===emp).reduce((a,r)=>a+r.total,0);
          const isDel=confirmDel===emp;
          return(
            <div key={i} style={{background:C.card,border:`1.5px solid ${isDel?C.red:C.border}`,
              borderRadius:12,padding:"13px 16px",display:"flex",alignItems:"center",gap:12,
              transition:"border-color 0.2s"}}>
              <div style={{width:42,height:42,borderRadius:10,
                background:`linear-gradient(135deg,${C.blue}22,${C.blue}44)`,
                border:`1px solid ${C.blueBrd}`,
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:20,flexShrink:0}}>🏢</div>
              <div style={{flex:1}}>
                <div style={{fontWeight:800,fontSize:14,color:C.text}}>{emp}</div>
                <div style={{display:"flex",gap:10,marginTop:5,flexWrap:"wrap"}}>
                  <span style={{fontSize:11,color:C.muted}}>{regs} registro{regs!==1?"s":""}</span>
                  {total>0&&<span style={{fontSize:11,color:C.green,fontWeight:600}}>{fmtBRL(total)}</span>}
                  {regs>0&&<span style={{fontSize:11,color:C.muted}}>({fmtBRL(pago)} pago)</span>}
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:5,alignItems:"flex-end"}}>
                {isDel?(
                  <div style={{display:"flex",gap:5}}>
                    <button onClick={()=>setConfirmDel(null)} style={{
                      background:C.panel,border:`1px solid ${C.border}`,color:C.muted,
                      padding:"5px 10px",borderRadius:8,cursor:"pointer",
                      fontFamily:"inherit",fontSize:11,fontWeight:700}}>Não</button>
                    <button onClick={()=>excluir(emp)} style={{
                      background:C.redDim,border:`1px solid ${C.redBrd}`,color:C.red,
                      padding:"5px 10px",borderRadius:8,cursor:"pointer",
                      fontFamily:"inherit",fontSize:11,fontWeight:700}}>Sim, excluir</button>
                  </div>
                ):(
                  <button onClick={()=>setConfirmDel(emp)} style={{
                    background:C.redDim,border:`1px solid ${C.redBrd}`,color:C.red,
                    padding:"5px 12px",borderRadius:8,cursor:"pointer",
                    fontFamily:"inherit",fontSize:12,fontWeight:700}}>🗑 Excluir</button>
                )}
                {regs>0&&!isDel&&(
                  <span style={{fontSize:10,color:C.amber}}>⚠ tem registros</span>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {/* Adicionar nova empresa */}
      <div style={{background:C.card,border:`1.5px solid ${C.green}`,borderRadius:12,padding:"16px"}}>
        <div style={{fontSize:13,fontWeight:800,color:C.green,marginBottom:12}}>＋ Nova Empresa</div>
        <div style={{display:"flex",gap:8}}>
          <input
            value={nova}
            onChange={e=>{setNova(e.target.value);setErr("");}}
            onKeyDown={e=>e.key==="Enter"&&adicionar()}
            placeholder="Nome da empresa..."
            style={{flex:1,background:C.panel,border:`1.5px solid ${C.border}`,borderRadius:9,
              padding:"10px 14px",color:C.text,fontSize:14,outline:"none",fontFamily:"inherit"}}
            onFocus={e=>e.target.style.borderColor=C.green}
            onBlur={e=>e.target.style.borderColor=C.border}/>
          <button onClick={adicionar} style={{
            background:"linear-gradient(135deg,#F97316,#EA580C)",border:"none",
            color:"#0A0A0A",padding:"10px 18px",borderRadius:9,cursor:"pointer",
            fontFamily:"inherit",fontSize:14,fontWeight:800,whiteSpace:"nowrap"}}>
            ✓ Adicionar
          </button>
        </div>
        {err&&(
          <div style={{marginTop:8,background:C.redDim,border:`1px solid ${C.redBrd}`,
            borderRadius:8,padding:"7px 12px",color:C.red,fontSize:12,fontWeight:600}}>
            ⚠ {err}
          </div>
        )}
        <div style={{marginTop:8,fontSize:11,color:C.muted}}>
          Dica: pressione Enter para adicionar rapidamente.
        </div>
      </div>
    </Modal>
  );
}

/* ══════════════════════════════════════════════════════════════
   MODAL GERENCIAR USUÁRIOS
══════════════════════════════════════════════════════════════ */
function ModalUsuarios({users,setUsers,currentUser,rows,onClose}){
  const[editId,setEditId]=useState(null);
  const[form,setForm]=useState({nome:"",user:"",senha:"",role:"operator"});
  const[showSenha,setShowSenha]=useState(false);
  const[msg,setMsg]=useState("");
  const[err,setErr]=useState("");
  const[addOpen,setAddOpen]=useState(false);
  const[addForm,setAddForm]=useState({nome:"",user:"",senha:"",role:"operator"});
  const[addShowSenha,setAddShowSenha]=useState(false);
  const[addErr,setAddErr]=useState("");
  const[addMsg,setAddMsg]=useState("");

  function startEdit(u){
    setEditId(u.id);
    setForm({nome:u.nome,user:u.user,senha:u.senha,role:u.role});
    setMsg(""); setErr("");
  }
  function cancelEdit(){ setEditId(null); setMsg(""); setErr(""); }

  const[confirmDel,setConfirmDel]=useState(null); // user id to confirm delete

  function deleteUser(uid){
    if(uid===currentUser.id) return; // can't delete yourself
    setUsers(prev=>prev.filter(u=>u.id!==uid));
    setConfirmDel(null);
  }

  function addUser(){
    if(!addForm.nome.trim()||!addForm.user.trim()||!addForm.senha.trim()){
      setAddErr("Preencha nome, usuário e senha."); return;
    }
    if(users.find(u=>u.user===addForm.user.trim())){
      setAddErr("Nome de usuário já existe."); return;
    }
    const novoId=(addForm.role==="admin"?"a":"o")+Date.now();
    setUsers(prev=>[...prev,{
      id:novoId,nome:addForm.nome.trim(),user:addForm.user.trim(),
      senha:addForm.senha,role:addForm.role,avatar:""
    }]);
    setAddMsg("✓ Usuário criado com sucesso!");
    setAddErr("");
    setTimeout(()=>{
      setAddOpen(false);
      setAddForm({nome:"",user:"",senha:"",role:"operator"});
      setAddMsg("");
    },1400);
  }

  function salvar(){
    if(!form.nome.trim()||!form.user.trim()||!form.senha.trim()){
      setErr("Preencha nome, usuário e senha."); return;
    }
    // check duplicate username (excluding self)
    const dup = users.find(u=>u.id!==editId && u.user===form.user.trim());
    if(dup){ setErr("Este nome de usuário já está em uso."); return; }

    setUsers(prev=>prev.map(u=>u.id!==editId?u:{
      ...u,
      nome:form.nome.trim(),
      user:form.user.trim(),
      senha:form.senha,
      role:form.role,
    }));
    setMsg("✓ Salvo com sucesso!");
    setErr("");
    setTimeout(()=>{ setEditId(null); setMsg(""); },1400);
  }

  const F=({label,value,onChange,type="text",placeholder,right})=>{
    const[f,setF]=useState(false);
    return(
      <div style={{marginBottom:12}}>
        <label style={{display:"block",color:C.muted,fontSize:10,fontWeight:700,
          letterSpacing:0.8,textTransform:"uppercase",marginBottom:5}}>{label}</label>
        <div style={{position:"relative"}}>
          <input type={type} value={value} onChange={e=>onChange(e.target.value)}
            placeholder={placeholder}
            onFocus={()=>setF(true)} onBlur={()=>setF(false)}
            style={{width:"100%",background:C.card,border:`1.5px solid ${f?C.green:C.border}`,
              borderRadius:9,padding:right?"10px 40px 10px 12px":"10px 12px",
              color:C.text,fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}/>
          {right&&<div style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",cursor:"pointer"}}
            onClick={right.onClick}>{right.icon}</div>}
        </div>
      </div>
    );
  };

  return(
    <Modal title="👥 Gerenciar Usuários" onClose={onClose}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        {users.map(u=>{
          const isEdit=editId===u.id;
          const isMe=u.id===currentUser.id;
          const regs=rows.filter(r=>r.criadoPor===u.id).length;
          const acColor=u.role==="admin"?C.green:C.blue;
          return(
            <div key={u.id} style={{background:C.card,border:`1.5px solid ${isEdit?C.green:C.border}`,
              borderRadius:14,overflow:"hidden",transition:"border-color 0.2s"}}>

              {/* Header do card */}
              <div style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",
                borderBottom:isEdit?`1px solid ${C.border}`:"none"}}>
                <Avatar name={u.nome} size={46} color={acColor}/>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{fontWeight:800,fontSize:15}}>{u.nome}</div>
                    {isMe&&<Chip label="Você" variant="green"/>}
                  </div>
                  <div style={{fontSize:12,color:C.muted,fontFamily:"'DM Mono',monospace",marginTop:2}}>
                    @{u.user}
                  </div>
                  <div style={{display:"flex",gap:8,marginTop:6,alignItems:"center"}}>
                    <Chip label={u.role==="admin"?"🔑 Admin Sênior":"📋 Operador"}
                      variant={u.role==="admin"?"purple":"blue"}/>
                    <span style={{fontSize:11,color:C.muted}}>{regs} registro{regs!==1?"s":""}</span>
                  </div>
                </div>
                {!isEdit&&(
                  <div style={{display:"flex",gap:6,flexDirection:"column",alignItems:"flex-end"}}>
                    <button onClick={()=>{setConfirmDel(null);startEdit(u);}} style={{
                      background:C.greenDim,border:`1px solid ${C.greenBrd}`,
                      color:C.green,padding:"6px 14px",borderRadius:9,cursor:"pointer",
                      fontFamily:"inherit",fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>
                      ✏ Editar
                    </button>
                    {!isMe&&(
                      confirmDel===u.id?(
                        <div style={{display:"flex",gap:5}}>
                          <button onClick={()=>setConfirmDel(null)} style={{
                            background:C.panel,border:`1px solid ${C.border}`,color:C.muted,
                            padding:"5px 10px",borderRadius:8,cursor:"pointer",
                            fontFamily:"inherit",fontSize:11,fontWeight:700}}>Não</button>
                          <button onClick={()=>deleteUser(u.id)} style={{
                            background:C.redDim,border:`1px solid ${C.redBrd}`,color:C.red,
                            padding:"5px 10px",borderRadius:8,cursor:"pointer",
                            fontFamily:"inherit",fontSize:11,fontWeight:700}}>Sim, excluir</button>
                        </div>
                      ):(
                        <button onClick={()=>setConfirmDel(u.id)} style={{
                          background:C.redDim,border:`1px solid ${C.redBrd}`,
                          color:C.red,padding:"6px 14px",borderRadius:9,cursor:"pointer",
                          fontFamily:"inherit",fontSize:12,fontWeight:700,whiteSpace:"nowrap"}}>
                          🗑 Excluir
                        </button>
                      )
                    )}
                  </div>
                )}
              </div>

              {/* Form de edição inline */}
              {isEdit&&(
                <div style={{padding:"16px 16px 12px"}}>
                  <F label="Nome completo" value={form.nome} onChange={v=>setForm(f=>({...f,nome:v}))} placeholder="Nome"/>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
                    <F label="Usuário (login)" value={form.user} onChange={v=>setForm(f=>({...f,user:v}))} placeholder="usuario"/>
                    <F label="Senha"
                      value={form.senha}
                      onChange={v=>setForm(f=>({...f,senha:v}))}
                      type={showSenha?"text":"password"}
                      placeholder="••••••••"
                      right={{icon:showSenha?"🙈":"👁",onClick:()=>setShowSenha(s=>!s)}}/>
                  </div>

                  {/* Perfil */}
                  <div style={{marginBottom:14}}>
                    <label style={{display:"block",color:C.muted,fontSize:10,fontWeight:700,
                      letterSpacing:0.8,textTransform:"uppercase",marginBottom:8}}>Perfil de acesso</label>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                      {[
                        {role:"admin",    label:"🔑 Admin Sênior", desc:"Acesso total ao sistema", color:C.green},
                        {role:"operator", label:"📋 Operador",      desc:"Apenas inserção de dados", color:C.blue},
                      ].map(opt=>(
                        <div key={opt.role} onClick={()=>setForm(f=>({...f,role:opt.role}))}
                          style={{background:form.role===opt.role?`${opt.color}22`:C.panel,
                            border:`1.5px solid ${form.role===opt.role?opt.color:C.border}`,
                            borderRadius:10,padding:"10px 12px",cursor:"pointer",transition:"all 0.15s"}}>
                          <div style={{fontWeight:700,fontSize:13,
                            color:form.role===opt.role?opt.color:C.text}}>{opt.label}</div>
                          <div style={{fontSize:11,color:C.muted,marginTop:3}}>{opt.desc}</div>
                        </div>
                      ))}
                    </div>
                  </div>

                  {err&&<div style={{background:C.redDim,border:`1px solid ${C.redBrd}`,
                    borderRadius:8,padding:"8px 12px",color:C.red,fontSize:12,fontWeight:600,marginBottom:10}}>
                    ⚠ {err}</div>}
                  {msg&&<div style={{background:C.greenDim,border:`1px solid ${C.greenBrd}`,
                    borderRadius:8,padding:"8px 12px",color:C.green,fontSize:12,fontWeight:700,marginBottom:10}}>
                    {msg}</div>}

                  <div style={{display:"flex",gap:8}}>
                    <button onClick={cancelEdit} style={{flex:1,background:C.panel,
                      border:`1px solid ${C.border}`,color:C.muted,padding:"9px",
                      borderRadius:9,cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:700}}>
                      Cancelar
                    </button>
                    <button onClick={salvar} style={{flex:2,
                      background:"linear-gradient(135deg,#F97316,#EA580C)",border:"none",
                      color:"#0A0A0A",padding:"9px",borderRadius:9,cursor:"pointer",
                      fontFamily:"inherit",fontSize:13,fontWeight:800}}>
                      💾 Salvar Alterações
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* ── ADICIONAR NOVO USUÁRIO ── */}
      <div style={{marginTop:16}}>
        {!addOpen?(
          <button onClick={()=>{setAddOpen(true);setAddErr("");setAddMsg("");}}
            style={{width:"100%",background:"linear-gradient(135deg,#F97316,#EA580C)",
              border:"none",color:"#0A0A0A",padding:"11px",borderRadius:11,cursor:"pointer",
              fontFamily:"inherit",fontSize:14,fontWeight:800}}>
            ＋ Adicionar Novo Usuário
          </button>
        ):(
          <div style={{background:C.card,border:`1.5px solid ${C.green}`,borderRadius:14,padding:"18px"}}>
            <div style={{fontSize:14,fontWeight:800,color:C.green,marginBottom:16}}>
              ＋ Novo Usuário
            </div>

            {/* Nome */}
            <div style={{marginBottom:12}}>
              <label style={{display:"block",color:C.muted,fontSize:10,fontWeight:700,
                letterSpacing:0.8,textTransform:"uppercase",marginBottom:5}}>Nome completo *</label>
              <input value={addForm.nome} onChange={e=>setAddForm(f=>({...f,nome:e.target.value}))}
                placeholder="Ex: João Silva"
                style={{width:"100%",background:C.panel,border:`1.5px solid ${C.border}`,borderRadius:9,
                  padding:"10px 12px",color:C.text,fontSize:14,outline:"none",
                  boxSizing:"border-box",fontFamily:"inherit"}}
                onFocus={e=>e.target.style.borderColor=C.green}
                onBlur={e=>e.target.style.borderColor=C.border}/>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
              {/* Usuário */}
              <div style={{marginBottom:12}}>
                <label style={{display:"block",color:C.muted,fontSize:10,fontWeight:700,
                  letterSpacing:0.8,textTransform:"uppercase",marginBottom:5}}>Usuário (login) *</label>
                <input value={addForm.user} onChange={e=>setAddForm(f=>({...f,user:e.target.value}))}
                  placeholder="Ex: joao.silva"
                  style={{width:"100%",background:C.panel,border:`1.5px solid ${C.border}`,borderRadius:9,
                    padding:"10px 12px",color:C.text,fontSize:14,outline:"none",
                    boxSizing:"border-box",fontFamily:"inherit"}}
                  onFocus={e=>e.target.style.borderColor=C.green}
                  onBlur={e=>e.target.style.borderColor=C.border}/>
              </div>
              {/* Senha */}
              <div style={{marginBottom:12}}>
                <label style={{display:"block",color:C.muted,fontSize:10,fontWeight:700,
                  letterSpacing:0.8,textTransform:"uppercase",marginBottom:5}}>Senha *</label>
                <div style={{position:"relative"}}>
                  <input type={addShowSenha?"text":"password"}
                    value={addForm.senha} onChange={e=>setAddForm(f=>({...f,senha:e.target.value}))}
                    placeholder="••••••••"
                    style={{width:"100%",background:C.panel,border:`1.5px solid ${C.border}`,borderRadius:9,
                      padding:"10px 40px 10px 12px",color:C.text,fontSize:14,outline:"none",
                      boxSizing:"border-box",fontFamily:"inherit"}}
                    onFocus={e=>e.target.style.borderColor=C.green}
                    onBlur={e=>e.target.style.borderColor=C.border}/>
                  <span onClick={()=>setAddShowSenha(s=>!s)}
                    style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",
                      cursor:"pointer",fontSize:16}}>
                    {addShowSenha?"🙈":"👁"}
                  </span>
                </div>
              </div>
            </div>

            {/* Perfil */}
            <div style={{marginBottom:14}}>
              <label style={{display:"block",color:C.muted,fontSize:10,fontWeight:700,
                letterSpacing:0.8,textTransform:"uppercase",marginBottom:8}}>Perfil de acesso</label>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {[
                  {role:"admin",    label:"🔑 Admin Sênior", desc:"Acesso total",       color:C.green},
                  {role:"operator", label:"📋 Operador",      desc:"Só inserção de dados", color:C.blue},
                ].map(opt=>(
                  <div key={opt.role} onClick={()=>setAddForm(f=>({...f,role:opt.role}))}
                    style={{background:addForm.role===opt.role?`${opt.color}22`:C.panel,
                      border:`1.5px solid ${addForm.role===opt.role?opt.color:C.border}`,
                      borderRadius:10,padding:"10px 12px",cursor:"pointer",transition:"all 0.15s"}}>
                    <div style={{fontWeight:700,fontSize:13,
                      color:addForm.role===opt.role?opt.color:C.text}}>{opt.label}</div>
                    <div style={{fontSize:11,color:C.muted,marginTop:3}}>{opt.desc}</div>
                  </div>
                ))}
              </div>
            </div>

            {addErr&&<div style={{background:C.redDim,border:`1px solid ${C.redBrd}`,
              borderRadius:8,padding:"8px 12px",color:C.red,fontSize:12,fontWeight:600,marginBottom:10}}>
              ⚠ {addErr}</div>}
            {addMsg&&<div style={{background:C.greenDim,border:`1px solid ${C.greenBrd}`,
              borderRadius:8,padding:"8px 12px",color:C.green,fontSize:12,fontWeight:700,marginBottom:10}}>
              {addMsg}</div>}

            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{setAddOpen(false);setAddErr("");setAddForm({nome:"",user:"",senha:"",role:"operator"});}}
                style={{flex:1,background:C.panel,border:`1px solid ${C.border}`,color:C.muted,
                  padding:"10px",borderRadius:9,cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:700}}>
                Cancelar
              </button>
              <button onClick={addUser}
                style={{flex:2,background:"linear-gradient(135deg,#F97316,#EA580C)",border:"none",
                  color:"#0A0A0A",padding:"10px",borderRadius:9,cursor:"pointer",
                  fontFamily:"inherit",fontSize:14,fontWeight:800}}>
                ✓ Criar Usuário
              </button>
            </div>
          </div>
        )}
      </div>
    </Modal>
  );
}

/* ══════════════════════════════════════════════════════════════
   ADMIN VIEW — acesso total
══════════════════════════════════════════════════════════════ */
function AdminView({currentUser,rows,setRows,onLogout,users,setUsers,empresas,setEmpresas,funcs,setFuncs}){
  const[tab,setTab]=useState("dashboard");
  const[search,setSearch]=useState("");
  const[filtEmpresa,setFiltEmpresa]=useState("todas");
  const[filtStatus,setFiltStatus]=useState("todos");
  const[filtTurno,setFiltTurno]=useState("todos");
  const[modalReg,setModalReg]=useState(false);
  const[editRow,setEditRow]=useState(null);
  const[form,setForm]=useState(emptyReg);
  const[modalUser,setModalUser]=useState(false);
  const[modalCard,setModalCard]=useState(null); // 'geral' | 'pago' | 'pendente' | 'epi'
  const[modalTurno,setModalTurno]=useState(null); // turno id
  const[modalFunc,setModalFunc]=useState(null); // row object for employee detail
  const[modalEmpresas,setModalEmpresas]=useState(false);

  const totalGeral    = rows.reduce((a,r)=>a+r.total,0);
  const totalPago     = rows.filter(r=>r.pago).reduce((a,r)=>a+r.total,0);
  const totalPendente = totalGeral-totalPago;
  const semEpi        = rows.filter(r=>!r.epi).length;

  const visible=useMemo(()=>rows.filter(r=>{
    if(filtEmpresa!=="todas"&&r.empresa!==filtEmpresa)return false;
    if(filtStatus==="pago"&&!r.pago)return false;
    if(filtStatus==="pendente"&&r.pago)return false;
    if(filtTurno!=="todos"&&r.turno!==filtTurno)return false;
    if(search&&!r.nome.toLowerCase().includes(search.toLowerCase()))return false;
    return true;
  }),[rows,filtEmpresa,filtStatus,filtTurno,search]);

  function togglePago(id){ setRows(p=>p.map(r=>r.id===id?{...r,pago:!r.pago}:r)); }
  function deleteRow(id){ setRows(p=>p.filter(r=>r.id!==id)); }

  function openAdd(){
    setForm(emptyReg); setEditRow(null); setModalReg(true);
  }
  function openEdit(row){
    setForm({nome:row.nome,cpf:row.cpf||"",pix:row.pix||"",tel:row.tel||"",
      empresa:row.empresa,turno:row.turno,data:row.data,
      valorDiaria:String(row.valorDiaria),transporte:row.transporte,
      vt:String(row.vt),refeicao:row.refeicao||false,vr:String(row.vr||0),epi:row.epi,obs:row.obs||""});
    setEditRow(row); setModalReg(true);
  }
  function saveModal(){
    if(!form.nome.trim())return;
    const t=calcTotal(form.valorDiaria,form.transporte,form.vt,form.refeicao,form.vr);
    if(editRow){
      setRows(p=>p.map(r=>r.id!==editRow.id?r:{...r,nome:form.nome,cpf:form.cpf,
        pix:form.pix,tel:form.tel,empresa:form.empresa,turno:form.turno,data:form.data,
        valorDiaria:Number(form.valorDiaria)||0,transporte:form.transporte,
        vt:Number(form.vt)||0,refeicao:form.refeicao,vr:Number(form.vr)||0,epi:form.epi,obs:form.obs,total:t}));
    } else {
      setRows(p=>[...p,{id:mkId(),nome:form.nome,cpf:form.cpf,pix:form.pix,tel:form.tel,
        empresa:form.empresa,turno:form.turno,data:form.data,
        valorDiaria:Number(form.valorDiaria)||0,transporte:form.transporte,
        vt:Number(form.vt)||0,refeicao:form.refeicao,vr:Number(form.vr)||0,epi:form.epi,pago:false,obs:form.obs,
        criadoPor:currentUser.id,total:t}]);
    }
    setModalReg(false);
  }

  const turnoForm=getTurno(form.turno);

  const Pill=({label,active,onClick,color})=>(
    <button onClick={onClick} style={{background:active?(color||C.green):C.card,
      color:active?(color?C.text:C.bg):C.muted,
      border:`1px solid ${active?(color||C.green):C.border}`,
      borderRadius:8,padding:"5px 12px",cursor:"pointer",fontFamily:"inherit",
      fontSize:12,fontWeight:700,transition:"all 0.15s"}}>
      {label}
    </button>
  );

  const NavBtn=({id,icon,label})=>(
    <button onClick={()=>setTab(id)} style={{background:"none",border:"none",cursor:"pointer",
      padding:"14px 18px",fontSize:13,fontWeight:600,fontFamily:"inherit",
      color:tab===id?C.green:C.muted,
      borderBottom:tab===id?`2px solid ${C.green}`:"2px solid transparent",
      display:"flex",alignItems:"center",gap:6}}>
      <span style={{fontSize:15}}>{icon}</span>{label}
    </button>
  );

  // por empresa breakdown
  const byEmpresa=empresas.map(e=>{
    const rs=rows.filter(r=>r.empresa===e);
    return{e,total:rs.reduce((a,r)=>a+r.total,0),pago:rs.filter(r=>r.pago).reduce((a,r)=>a+r.total,0),count:rs.length};
  });

  return(
    <div style={{minHeight:"100vh",background:C.bg,fontFamily:"'DM Sans','Sora',sans-serif",color:C.text}}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

      {/* Header */}
      <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,
        padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",
        height:64,position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:36,height:36,borderRadius:10,
            background:"linear-gradient(135deg,#F97316,#EA580C)",
            display:"flex",alignItems:"center",justifyContent:"center",
            boxShadow:"0 4px 16px #F9731650"}}>
            <span style={{fontSize:20,fontWeight:900,color:"#fff",fontFamily:"Arial Black,sans-serif",letterSpacing:-2}}>✕</span></div>
          <div>
            <div style={{fontWeight:900,fontSize:16,letterSpacing:-0.3,
              background:"linear-gradient(90deg,#F97316,#EA580C)",
              WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>XTREME</div>
            <div style={{fontSize:10,color:C.muted,letterSpacing:1,textTransform:"uppercase"}}>Logística e Terceirização · Admin</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <Chip label="Admin Sênior" variant="purple"/>
          <Avatar name={currentUser.nome} size={34} color={C.purple}/>
          <div>
            <div style={{fontSize:13,fontWeight:700}}>{currentUser.nome}</div>
            <div style={{fontSize:11,color:C.muted}}>@{currentUser.user}</div>
          </div>
          <button onClick={()=>setModalUser(true)} style={{background:C.purpleDim,
            border:`1px solid ${C.purpleBrd}`,color:C.purple,
            padding:"7px 12px",borderRadius:9,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700}}>
            👥 Usuários
          </button>
          <button onClick={()=>setModalEmpresas(true)} style={{background:C.blueDim,
            border:`1px solid ${C.blueBrd}`,color:C.blue,
            padding:"7px 12px",borderRadius:9,cursor:"pointer",fontFamily:"inherit",fontSize:12,fontWeight:700}}>
            🏢 Empresas
          </button>
          <button onClick={openAdd} style={{background:`linear-gradient(135deg,#F97316,#EA580C)`,
            border:"none",color:C.bg,padding:"7px 16px",borderRadius:9,cursor:"pointer",
            fontFamily:"inherit",fontSize:13,fontWeight:800}}>＋ Novo</button>
          <button onClick={()=>exportToExcel(rows,visible)} style={{background:"#16602211",
            border:"1px solid #16602255",color:"#4ADE80",
            padding:"7px 14px",borderRadius:9,cursor:"pointer",
            fontFamily:"inherit",fontSize:12,fontWeight:700,display:"flex",alignItems:"center",gap:6}}>
            📊 Exportar Excel
          </button>
          <button onClick={onLogout} style={{background:C.redDim,border:`1px solid ${C.redBrd}`,
            color:C.red,padding:"7px 12px",borderRadius:9,cursor:"pointer",
            fontFamily:"inherit",fontSize:12,fontWeight:700}}>Sair</button>
        </div>
      </div>

      {/* Nav */}
      <div style={{background:C.panel,borderBottom:`1px solid ${C.border}`,
        display:"flex",padding:"0 20px"}}>
        <NavBtn id="dashboard"    icon="⬡" label="Dashboard"/>
        <NavBtn id="registros"   icon="◈" label="Registros"/>
        <NavBtn id="empresas"    icon="◉" label="Por Empresa"/>
        <NavBtn id="funcionarios" icon="👤" label="Funcionários"/>
      </div>

      <div style={{padding:"24px",maxWidth:1200,margin:"0 auto"}}>

        {/* ── DASHBOARD ── */}
        {tab==="dashboard"&&(
          <div>
            <div style={{marginBottom:24}}>
              <h1 style={{fontSize:24,fontWeight:800,margin:0}}>Visão Geral</h1>
              <p style={{color:C.muted,marginTop:4,fontSize:13}}>{rows.length} registros totais no sistema</p>
            </div>

            {/* Stats — clickable */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:28}}>
              {[
                {key:"geral",    label:"Total Geral",   value:fmtBRL(totalGeral),   sub:`${rows.length} registros`,                              icon:"◈", color:C.blue,                      dim:C.blueDim},
                {key:"pago",     label:"Total Pago",    value:fmtBRL(totalPago),    sub:`${rows.filter(r=>r.pago).length} funcionários pagos`,   icon:"✓", color:C.green,                     dim:C.greenDim},
                {key:"pendente", label:"Pendente",      value:fmtBRL(totalPendente),sub:`${rows.filter(r=>!r.pago).length} em aberto`,           icon:"◷", color:C.amber,                     dim:C.amberDim},
                {key:"epi",      label:"Sem EPI",       value:semEpi,               sub:semEpi>0?"⚠ Clique para ver":"✓ Todos regularizados",    icon:"🦺",color:semEpi>0?C.red:C.green,     dim:semEpi>0?C.redDim:C.greenDim},
              ].map((s)=>(
                <div key={s.key} onClick={()=>setModalCard(s.key)}
                  style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,
                    padding:"20px",position:"relative",overflow:"hidden",cursor:"pointer",
                    transition:"border-color 0.18s, transform 0.15s"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=s.color;e.currentTarget.style.transform="translateY(-2px)";}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.transform="translateY(0)";}}>
                  <div style={{position:"absolute",top:-12,right:-12,width:70,height:70,borderRadius:"50%",background:s.dim}}/>
                  <div style={{fontSize:24,marginBottom:10}}>{s.icon}</div>
                  <div style={{fontSize:24,fontWeight:800,color:s.color}}>{s.value}</div>
                  <div style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:0.8,marginTop:4,fontWeight:700}}>{s.label}</div>
                  <div style={{fontSize:12,color:C.muted,marginTop:6}}>{s.sub}</div>
                  <div style={{position:"absolute",bottom:12,right:14,fontSize:10,color:s.color,fontWeight:700,opacity:0.7}}>Ver detalhes →</div>
                </div>
              ))}
            </div>

            {/* Operadores */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:24}}>
              {users.filter(u=>u.role==="operator").map(op=>{
                const rs=rows.filter(r=>r.criadoPor===op.id);
                const tot=rs.reduce((a,r)=>a+r.total,0);
                return(
                  <div key={op.id} style={{background:C.card,border:`1px solid ${C.border}`,
                    borderRadius:14,padding:"18px 20px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}>
                      <Avatar name={op.nome} size={42} color={C.blue}/>
                      <div>
                        <div style={{fontWeight:700,fontSize:15}}>{op.nome}</div>
                        <div style={{fontSize:11,color:C.muted}}>@{op.user} · Operador</div>
                      </div>
                      <Chip label={`${rs.length} reg.`} variant="blue"/>
                    </div>
                    <div style={{display:"flex",gap:16}}>
                      <div>
                        <div style={{fontSize:18,fontWeight:800,color:C.green}}>{fmtBRL(tot)}</div>
                        <div style={{fontSize:11,color:C.muted}}>Total inserido</div>
                      </div>
                      <div>
                        <div style={{fontSize:18,fontWeight:800,color:C.amber}}>
                          {fmtBRL(rs.filter(r=>!r.pago).reduce((a,r)=>a+r.total,0))}
                        </div>
                        <div style={{fontSize:11,color:C.muted}}>Pendente</div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Turno breakdown — clicável */}
            <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:"20px"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
                <div style={{fontSize:14,fontWeight:700}}>Distribuição por Turno</div>
                <div style={{fontSize:11,color:C.muted}}>Clique para ver detalhes</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
                {TURNOS.map(t=>{
                  const rs=rows.filter(r=>r.turno===t.id);
                  const tot=rs.reduce((a,r)=>a+r.total,0);
                  const pct=rs.length>0?(rs.filter(r=>r.pago).length/rs.length*100).toFixed(0):0;
                  return(
                    <div key={t.id} onClick={()=>setModalTurno(t.id)}
                      style={{background:`${t.color}11`,border:`1px solid ${t.color}33`,
                        borderRadius:12,padding:"16px",cursor:"pointer",transition:"all 0.15s",
                        position:"relative",overflow:"hidden"}}
                      onMouseEnter={e=>{e.currentTarget.style.background=`${t.color}22`;e.currentTarget.style.borderColor=`${t.color}66`;e.currentTarget.style.transform="translateY(-2px)";}}
                      onMouseLeave={e=>{e.currentTarget.style.background=`${t.color}11`;e.currentTarget.style.borderColor=`${t.color}33`;e.currentTarget.style.transform="translateY(0)";}}>
                      <div style={{fontSize:26,marginBottom:8}}>{t.icon}</div>
                      <div style={{fontSize:22,fontWeight:800,color:t.color}}>{rs.length}</div>
                      <div style={{fontSize:11,color:t.color,fontWeight:700,letterSpacing:0.5,textTransform:"uppercase",marginBottom:6}}>{t.label}</div>
                      <div style={{fontSize:14,fontWeight:800,color:C.text,marginBottom:8}}>{fmtBRL(tot)}</div>
                      {/* mini progress */}
                      <div style={{height:3,background:`${t.color}22`,borderRadius:2}}>
                        <div style={{width:`${pct}%`,height:"100%",background:t.color,borderRadius:2}}/>
                      </div>
                      <div style={{fontSize:10,color:C.muted,marginTop:4}}>{pct}% pago</div>
                      <div style={{position:"absolute",bottom:10,right:12,fontSize:10,color:t.color,fontWeight:700,opacity:0.8}}>Ver →</div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        )}

        {/* ── REGISTROS ── */}
        {tab==="registros"&&(
          <div>
            {/* Filters */}
            <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:14,
              padding:"14px 18px",marginBottom:18,display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
              <div style={{position:"relative",flex:"0 0 200px"}}>
                <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",
                  color:C.muted,fontSize:14}}>⌕</span>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar..."
                  style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,
                    borderRadius:9,padding:"8px 10px 8px 30px",color:C.text,
                    fontSize:13,outline:"none",boxSizing:"border-box",fontFamily:"inherit"}}
                  onFocus={e=>e.target.style.borderColor=C.green}
                  onBlur={e=>e.target.style.borderColor=C.border}/>
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                <Pill label="Todas empresas" active={filtEmpresa==="todas"} onClick={()=>setFiltEmpresa("todas")}/>
                {empresas.map(e=><Pill key={e} label={e.split(" ")[0]} active={filtEmpresa===e} onClick={()=>setFiltEmpresa(e)}/>)}
              </div>
              <div style={{display:"flex",gap:6}}>
                <Pill label="Todos" active={filtStatus==="todos"} onClick={()=>setFiltStatus("todos")}/>
                <Pill label="✓ Pago" active={filtStatus==="pago"} onClick={()=>setFiltStatus("pago")} color={C.green}/>
                <Pill label="◷ Pend." active={filtStatus==="pendente"} onClick={()=>setFiltStatus("pendente")} color={C.amber}/>
              </div>
              <div style={{display:"flex",gap:6}}>
                <Pill label="Todos turnos" active={filtTurno==="todos"} onClick={()=>setFiltTurno("todos")}/>
                {TURNOS.map(t=><Pill key={t.id} label={`${t.icon} ${t.label}`} active={filtTurno===t.id} onClick={()=>setFiltTurno(t.id)} color={t.color}/>)}
              </div>
              <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:12,color:C.muted}}>{visible.length} resultado{visible.length!==1?"s":""}</span>
                <button onClick={()=>exportToExcel(rows,visible)} style={{
                  background:"#16602211",border:"1px solid #16602255",color:"#4ADE80",
                  padding:"5px 12px",borderRadius:8,cursor:"pointer",fontFamily:"inherit",
                  fontSize:11,fontWeight:700}}>📊 Exportar filtrado</button>
              </div>
            </div>

            {/* Table */}
            <div style={{background:C.panel,border:`1px solid ${C.border}`,borderRadius:16,overflow:"hidden"}}>

                              {!r.epi&&<Chip label="⚠ EPI" variant="red"/>}
                            </div>
                          </div>
                        ))}
                      </div>
                      {/* mini progress */}
                      <div style={{marginTop:10,height:3,background:C.border,borderRadius:2}}>
                        <div style={{width:`${sorted.length>0?(pagoCount/sorted.length*100):0}%`,

                      </div>
                    </div>
                  );
                })}
              </div>
            )}
            <button onClick={()=>setModalTurno(null)} style={{width:"100%",marginTop:18,
              background:C.card,border:`1px solid ${C.border}`,color:C.muted,
              padding:"11px",borderRadius:11,cursor:"pointer",fontFamily:"inherit",fontSize:14,fontWeight:700}}>
              Fechar
            </button>
          </Modal>
        );
      })()}
      {/* ── MODAL DETALHE DO FUNCIONÁRIO ── */}
      {modalFunc&&(()=>{
        const r=modalFunc;
        const t=getTurno(r.turno);
        const op=users.find(u=>u.id===r.criadoPor);
        // gather all records for this employee name
        const todosRegs=rows.filter(x=>x.nome===r.nome).sort((a,b)=>a.data.localeCompare(b.data));
        const totalAcum=todosRegs.reduce((a,x)=>a+x.total,0);
        const diasTrab=todosRegs.length;
        const pagoCount=todosRegs.filter(x=>x.pago).length;
        return(
          <Modal title="" onClose={()=>setModalFunc(null)}>
            {/* Hero header */}
            <div style={{background:`linear-gradient(135deg,#1A1006,#2C1808)`,
